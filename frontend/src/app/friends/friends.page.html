<ion-header>
  <ion-toolbar>
    <ion-title>Friends</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-searchbar
    [(ngModel)]="searchQuery"
    (ionInput)="search()"
    placeholder="Search users"
  ></ion-searchbar>

  <ion-list *ngIf="searchResults.length > 0">
    <ion-item *ngFor="let user of searchResults; trackBy: trackByUser">
      <ion-avatar slot="start">
        <img [src]="user.avatar || 'assets/default-avatar.png'" alt="" />
      </ion-avatar>
      <ion-label>
        <h2>{{ user.name || 'Unknown' }}</h2>
        <p>{{ user.email }}</p>
      </ion-label>
      <ion-buttons slot="end">
        <ion-button color="primary" (click)="addFriend(user.id)">
          Add friend
        </ion-button>
      </ion-buttons>
    </ion-item>
  </ion-list>

  <ion-list *ngIf="pendingRequests.length > 0">
    <ion-list-header>Pending Requests</ion-list-header>
    <ion-item *ngFor="let req of pendingRequests; trackBy: trackByRequest">
      <ion-label>{{ req.id }}</ion-label>
      <ion-buttons slot="end">
        <ion-button color="success" (click)="acceptRequest(req.id)">Accept</ion-button>
        <ion-button color="danger" (click)="rejectRequest(req.id)">Reject</ion-button>
      </ion-buttons>
    </ion-item>
  </ion-list>

  <ion-list>
    <ion-list-header>My Friends</ion-list-header>
    <ion-item *ngFor="let friend of friends; trackBy: trackByUser">
      <ion-avatar slot="start">
        <img [src]="friend.avatar || 'assets/default-avatar.png'" alt="" />
      </ion-avatar>
      <ion-label>
        <h2>{{ friend.name || 'Unknown' }}</h2>
        <p>{{ friend.email }}</p>
      </ion-label>
      <ion-buttons slot="end">
        <ion-button color="danger" (click)="removeFriend(friend.id)">
          Remove
        </ion-button>
      </ion-buttons>
    </ion-item>
  </ion-list>

  <ion-item *ngIf="loading">
    <ion-label>Loading...</ion-label>
  </ion-item>

  <ion-item *ngIf="error">
    <ion-label color="danger">{{ error }}</ion-label>
  </ion-item>
</ion-content>
