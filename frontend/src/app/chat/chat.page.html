<ion-header>
  <ion-toolbar>
    <ion-title>Chat</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-list>
    <ion-item *ngFor="let friend of friends; trackBy: trackByUser" (click)="openConversation(friend.id)" detail>
      <ion-avatar slot="start">
        <img [src]="friend.avatar || 'assets/default-avatar.png'" alt="" />
      </ion-avatar>
      <ion-label>
        <h2>{{ friend.name || 'Unknown' }}</h2>
        <p>{{ friend.email }}</p>
      </ion-label>
    </ion-item>
  </ion-list>

  <ion-item *ngIf="loading">
    <ion-label>Loading...</ion-label>
  </ion-item>

  <ion-item *ngIf="friends.length === 0 && !loading && !error">
    <ion-label>No friends to chat with</ion-label>
  </ion-item>

  <ion-item *ngIf="error">
    <ion-label color="danger">{{ error }}</ion-label>
  </ion-item>
</ion-content>
