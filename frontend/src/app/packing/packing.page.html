<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button text="Indietro"></ion-back-button>
    </ion-buttons>
    <ion-title>Lista bagaglio</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="openAdd()">
        <ion-icon slot="icon-only" name="add-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-list *ngIf="!loading; else loadingSpinner">
    <ion-item *ngIf="items.length === 0">
      <ion-label class="ion-text-center ion-padding">
        <p>Nessun oggetto ancora</p>
      </ion-label>
    </ion-item>

    <ion-item *ngFor="let item of items; trackBy: trackById">
      <ion-checkbox slot="start" [checked]="item.packed" (ionChange)="togglePacked(item)"></ion-checkbox>
      <ion-label>
        <h2 [class.strikethrough]="item.packed">{{ item.item }}</h2>
        <p *ngIf="item.quantity || item.category">
          <span *ngIf="item.quantity">Qtà: {{ item.quantity }}</span>
          <span *ngIf="item.category"> · {{ item.category }}</span>
        </p>
      </ion-label>
      <ion-button slot="end" color="danger" fill="clear" (click)="deleteItem(item.id)">
        <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
      </ion-button>
    </ion-item>
  </ion-list>

  <ng-template #loadingSpinner>
    <div class="ion-text-center ion-padding">
      <ion-spinner></ion-spinner>
    </div>
  </ng-template>

  <ion-card *ngIf="showForm">
    <ion-card-header>
      <ion-card-title>Aggiungi oggetto</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <ion-item>
        <ion-label position="floating">Oggetto</ion-label>
        <ion-input [(ngModel)]="formItem"></ion-input>
      </ion-item>
      <ion-item>
        <ion-label position="floating">Quantità</ion-label>
        <ion-input type="number" [(ngModel)]="formQuantity"></ion-input>
      </ion-item>
      <ion-item>
        <ion-label position="floating">Categoria</ion-label>
        <ion-input [(ngModel)]="formCategory"></ion-input>
      </ion-item>
      <div class="ion-padding-top ion-text-end">
        <ion-button fill="outline" (click)="cancelForm()">Annulla</ion-button>
        <ion-button (click)="saveItem()">Salva</ion-button>
      </div>
    </ion-card-content>
  </ion-card>
</ion-content>
