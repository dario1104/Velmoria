<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button text="Indietro"></ion-back-button>
    </ion-buttons>
    <ion-title>Attività</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-list *ngIf="!loading; else loadingSpinner">
    <ion-item *ngIf="events.length === 0">
      <ion-label class="ion-text-center ion-padding">
        <p>Nessun evento ancora</p>
      </ion-label>
    </ion-item>

    <ion-item *ngFor="let event of events; trackBy: trackById">
      <ion-label>
        <h2>{{ event.title }}</h2>
        <p>
          <ion-badge>{{ event.type }}</ion-badge>
          <span class="ion-padding-start">{{ event.timestamp | date:'medium' }}</span>
        </p>
        <p *ngIf="event.content">{{ event.content }}</p>
      </ion-label>
    </ion-item>
  </ion-list>

  <ng-template #loadingSpinner>
    <div class="ion-text-center ion-padding">
      <ion-spinner></ion-spinner>
    </div>
  </ng-template>
</ion-content>
