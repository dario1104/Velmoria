<ion-content [scrollY]="false">
  <div id="wrapper">
    <div id="brand">
      <img id="logo" src="assets/logo.png" alt="Velmoria" />
      <h1>Benvenuto</h1>
      <p>Accedi per continuare</p>
    </div>

    <div id="form">
      <ion-item>
        <ion-icon name="person-outline" slot="start"></ion-icon>
        <ion-input placeholder="Email" type="email" [(ngModel)]="email" (keyup.enter)="login()"></ion-input>
      </ion-item>
      <ion-item>
        <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
        <ion-input placeholder="Password" [type]="showPassword ? 'text' : 'password'" [(ngModel)]="password" (keyup.enter)="login()"></ion-input>
        <ion-icon slot="end" [name]="showPassword ? 'eye-off-outline' : 'eye-outline'" (click)="showPassword = !showPassword" class="eye-icon"></ion-icon>
      </ion-item>

      <ion-note color="danger" *ngIf="error" class="ion-padding-start">{{ error }}</ion-note>

      <ion-button expand="block" (click)="login()">
        Accedi
      </ion-button>
    </div>

    <div id="footer">
      <span>Non hai un account?</span>
      <a routerLink="/register">Registrati</a>
    </div>
  </div>
</ion-content>
