<ion-header>
  <ion-toolbar>
    <ion-title>User Search</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-searchbar
    [(ngModel)]="searchQuery"
    (ionInput)="search()"
    placeholder="Search users"
    debounce="300"
  ></ion-searchbar>

  <ion-list *ngIf="results.length > 0">
    <ion-item *ngFor="let user of results; trackBy: trackByUser">
      <ion-avatar slot="start">
        <img [src]="user.avatar || 'assets/default-avatar.png'" alt="" />
      </ion-avatar>
      <ion-label>
        <h2>{{ user.name || 'Unknown' }}</h2>
        <p>{{ user.email }}</p>
      </ion-label>
      <ion-buttons slot="end">
        <ion-button color="primary" (click)="sendRequest(user.id)">
          Add
        </ion-button>
      </ion-buttons>
    </ion-item>
  </ion-list>

  <ion-item *ngIf="loading">
    <ion-label>Searching...</ion-label>
  </ion-item>

  <ion-item *ngIf="searched && results.length === 0 && !loading && !error">
    <ion-label>No users found</ion-label>
  </ion-item>

  <ion-item *ngIf="error">
    <ion-label color="danger">{{ error }}</ion-label>
  </ion-item>
</ion-content>
