<ion-header>
  <ion-toolbar>
    <ion-title>Following</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-list>
    <ion-item *ngFor="let user of following; trackBy: trackByUser">
      <ion-avatar slot="start">
        <img [src]="user.avatar || 'assets/default-avatar.png'" alt="" />
      </ion-avatar>
      <ion-label>
        <h2>{{ user.name || 'Unknown' }}</h2>
        <p>{{ user.email }}</p>
      </ion-label>
    </ion-item>
  </ion-list>

  <ion-item *ngIf="loading">
    <ion-label>Loading...</ion-label>
  </ion-item>

  <ion-item *ngIf="following.length === 0 && !loading && !error">
    <ion-label>Not following anyone yet</ion-label>
  </ion-item>

  <ion-item *ngIf="error">
    <ion-label color="danger">{{ error }}</ion-label>
  </ion-item>
</ion-content>
