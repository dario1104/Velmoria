<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Dispositivi e sessioni</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-list>
    <ion-item *ngFor="let device of devices">
      <ion-icon name="desktop-outline" slot="start" *ngIf="!device.name.includes('iPhone')"></ion-icon>
      <ion-icon name="phone-portrait-outline" slot="start" *ngIf="device.name.includes('iPhone')"></ion-icon>
      <ion-label>
        <h2>{{ device.name }} <span *ngIf="device.current" style="color: var(--ion-color-primary); font-size: 0.8em;">(corrente)</span></h2>
        <p>{{ device.browser }} · {{ device.lastActive }}</p>
      </ion-label>
    </ion-item>
  </ion-list>
</ion-content>
