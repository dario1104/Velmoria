<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Profilo</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="profile-header slide-up">
    <div class="avatar-glow"></div>
    <div class="avatar">
      <ion-icon name="person-outline"></ion-icon>
    </div>
    <h2>{{ user?.name || 'Utente' }}</h2>
    <p>{{ user?.email }}</p>
  </div>

  <div class="menu-card fade-in">
    <div class="menu-item" routerLink="/edit-profile">
      <div class="menu-icon" style="background: rgba(0,200,83,0.1)">
        <ion-icon name="person-outline" style="color: #00c853"></ion-icon>
      </div>
      <span>Modifica profilo</span>
      <ion-icon name="chevron-forward" class="arrow"></ion-icon>
    </div>
    <div class="menu-item" routerLink="/change-password">
      <div class="menu-icon" style="background: rgba(255,171,0,0.1)">
        <ion-icon name="lock-closed-outline" style="color: #ffab00"></ion-icon>
      </div>
      <span>Cambia password</span>
      <ion-icon name="chevron-forward" class="arrow"></ion-icon>
    </div>
    <div class="menu-item" routerLink="/badges">
      <div class="menu-icon" style="background: rgba(233,30,99,0.1)">
        <ion-icon name="trophy-outline" style="color: #e91e63"></ion-icon>
      </div>
      <span>Badge e achievement</span>
      <ion-icon name="chevron-forward" class="arrow"></ion-icon>
    </div>
    <div class="menu-item" routerLink="/settings">
      <div class="menu-icon" style="background: rgba(255,171,0,0.1)">
        <ion-icon name="settings-outline" style="color: #ffab00"></ion-icon>
      </div>
      <span>Impostazioni</span>
      <ion-icon name="chevron-forward" class="arrow"></ion-icon>
    </div>
    <div class="menu-item" routerLink="/privacy-settings">
      <div class="menu-icon" style="background: rgba(156,39,176,0.1)">
        <ion-icon name="shield-checkmark-outline" style="color: #9c27b0"></ion-icon>
      </div>
      <span>Privacy</span>
      <ion-icon name="chevron-forward" class="arrow"></ion-icon>
    </div>
    <div class="menu-item" routerLink="/device-management">
      <div class="menu-icon" style="background: rgba(33,150,243,0.1)">
        <ion-icon name="laptop-outline" style="color: #2196f3"></ion-icon>
      </div>
      <span>Dispositivi e sessioni</span>
      <ion-icon name="chevron-forward" class="arrow"></ion-icon>
    </div>
    <div class="menu-item" routerLink="/import-export">
      <div class="menu-icon" style="background: rgba(0,188,212,0.1)">
        <ion-icon name="cloud-download-outline" style="color: #00bcd4"></ion-icon>
      </div>
      <span>Importa / Esporta dati</span>
      <ion-icon name="chevron-forward" class="arrow"></ion-icon>
    </div>
  </div>

  <div class="ion-padding">
    <ion-button expand="block" fill="outline" color="danger" (click)="logout()">
      <ion-icon name="log-out-outline" slot="start"></ion-icon>
      Esci
    </ion-button>
  </div>
</ion-content>
