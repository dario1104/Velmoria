<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button text="Indietro"></ion-back-button>
    </ion-buttons>
    <ion-title>Galleria</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div *ngIf="loading" class="ion-text-center ion-padding">
    <ion-spinner></ion-spinner>
  </div>

  <div *ngIf="!loading && markers.length === 0" class="ion-text-center ion-padding">
    <p>Nessun marker con media ancora</p>
  </div>

  <ion-card *ngFor="let marker of markers; trackBy: trackByMarkerId">
    <ion-card-header>
      <ion-card-title>{{ marker.type }}</ion-card-title>
      <ion-card-subtitle *ngIf="marker.content">{{ marker.content }}</ion-card-subtitle>
    </ion-card-header>
    <ion-card-content>
      <div class="media-grid" *ngIf="getMedia(marker).length > 0">
        <div *ngFor="let m of getMedia(marker); trackBy: trackByMediaId" class="media-item">
          <img *ngIf="m.type === 'image'" [src]="m.url" />
          <video *ngIf="m.type === 'video'" [src]="m.url" controls></video>
        </div>
      </div>
      <p *ngIf="getMedia(marker).length === 0" class="ion-text-center ion-padding">Nessun media</p>
    </ion-card-content>
  </ion-card>
</ion-content>
