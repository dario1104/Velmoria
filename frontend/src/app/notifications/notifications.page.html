<ion-header>
  <ion-toolbar>
    <ion-title>Notifications</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="markAllRead()">Mark all read</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-list>
    <ion-item
      *ngFor="let notification of notifications; trackBy: trackByNotification"
      (click)="markRead(notification)"
      [style.fontWeight]="notification.read ? 'normal' : 'bold'"
    >
      <ion-label>
        <h2>{{ notification.type }}</h2>
        <p>{{ notification.message }}</p>
        <p>{{ notification.createdAt | date }}</p>
      </ion-label>
    </ion-item>
  </ion-list>

  <ion-item *ngIf="loading">
    <ion-label>Loading...</ion-label>
  </ion-item>

  <ion-item *ngIf="notifications.length === 0 && !loading && !error">
    <ion-label>No notifications</ion-label>
  </ion-item>

  <ion-item *ngIf="error">
    <ion-label color="danger">{{ error }}</ion-label>
  </ion-item>
</ion-content>
