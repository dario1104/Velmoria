<ion-content [scrollY]="false">
  <div id="wrapper">
    <div id="brand">
      <img id="logo" src="assets/logo.png" alt="Velmoria" />
      <h1>Cambia password</h1>
    </div>

    <div id="form">
      <ng-container *ngIf="!success">
        <ion-item>
          <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
          <ion-input placeholder="Password attuale" [type]="showCurrentPassword ? 'text' : 'password'" [(ngModel)]="currentPassword"></ion-input>
          <ion-icon slot="end" [name]="showCurrentPassword ? 'eye-off-outline' : 'eye-outline'" (click)="showCurrentPassword = !showCurrentPassword" class="eye-icon"></ion-icon>
        </ion-item>
        <ion-item>
          <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
          <ion-input placeholder="Nuova password" [type]="showNewPassword ? 'text' : 'password'" [(ngModel)]="newPassword"></ion-input>
          <ion-icon slot="end" [name]="showNewPassword ? 'eye-off-outline' : 'eye-outline'" (click)="showNewPassword = !showNewPassword" class="eye-icon"></ion-icon>
        </ion-item>
        <ion-item>
          <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
          <ion-input placeholder="Conferma nuova password" [type]="showConfirmPassword ? 'text' : 'password'" [(ngModel)]="confirmPassword"></ion-input>
          <ion-icon slot="end" [name]="showConfirmPassword ? 'eye-off-outline' : 'eye-outline'" (click)="showConfirmPassword = !showConfirmPassword" class="eye-icon"></ion-icon>
        </ion-item>

        <ion-note color="danger" *ngIf="error" class="ion-padding-start">{{ error }}</ion-note>

        <ion-button expand="block" (click)="changePassword()">
          Cambia password
        </ion-button>
      </ng-container>

      <ion-icon *ngIf="success" name="checkmark-circle-outline" color="success" class="result-icon"></ion-icon>
      <p *ngIf="success">Password cambiata con successo</p>

      <ion-button expand="block" routerLink="/profile" *ngIf="success">
        Torna al profilo
      </ion-button>
    </div>
  </div>
</ion-content>
