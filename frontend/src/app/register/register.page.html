<ion-content [scrollY]="false">
  <div id="wrapper">
    <div id="brand">
      <img id="logo" src="assets/logo.png" alt="Velmoria" />
      <h1>Crea account</h1>
      <p>Inizia il tuo viaggio</p>
    </div>

    <div id="form">
      <ion-item>
        <ion-icon name="person-outline" slot="start"></ion-icon>
        <ion-input placeholder="Nome completo" [(ngModel)]="name" (keyup.enter)="register()"></ion-input>
      </ion-item>
      <ion-item>
        <ion-icon name="mail-outline" slot="start"></ion-icon>
        <ion-input placeholder="Email" type="email" [(ngModel)]="email" (keyup.enter)="register()"></ion-input>
      </ion-item>
      <ion-item>
        <ion-icon name="call-outline" slot="start"></ion-icon>
        <ion-input placeholder="Telefono" type="tel" [(ngModel)]="phone" (keyup.enter)="register()"></ion-input>
      </ion-item>
      <ion-item>
        <ion-icon name="document-text-outline" slot="start"></ion-icon>
        <ion-textarea placeholder="Bio" [(ngModel)]="bio" rows="2"></ion-textarea>
      </ion-item>
      <ion-item>
        <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
        <ion-input placeholder="Password" [type]="showPassword ? 'text' : 'password'" [(ngModel)]="password" (keyup.enter)="register()"></ion-input>
        <ion-icon slot="end" [name]="showPassword ? 'eye-off-outline' : 'eye-outline'" (click)="showPassword = !showPassword" class="eye-icon"></ion-icon>
      </ion-item>
      <ion-item>
        <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
        <ion-input placeholder="Conferma password" [type]="showConfirmPassword ? 'text' : 'password'" [(ngModel)]="confirmPassword" (keyup.enter)="register()"></ion-input>
        <ion-icon slot="end" [name]="showConfirmPassword ? 'eye-off-outline' : 'eye-outline'" (click)="showConfirmPassword = !showConfirmPassword" class="eye-icon"></ion-icon>
      </ion-item>

      <ion-note color="danger" *ngIf="error" class="ion-padding-start">{{ error }}</ion-note>

      <ion-button expand="block" (click)="register()">
        Registrati
      </ion-button>
    </div>

    <div id="footer">
      <span>Hai già un account?</span>
      <a routerLink="/login">Accedi</a>
    </div>
  </div>
</ion-content>
