<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button></ion-back-button>
    </ion-buttons>
    <ion-title>Expenses</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="openAdd()">
        <ion-icon slot="icon-only" name="add-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-list *ngIf="!loading; else loadingSpinner">
    <ion-item *ngIf="expenses.length === 0">
      <ion-label class="ion-text-center ion-padding">
        <p>No expenses recorded</p>
      </ion-label>
    </ion-item>

    <ion-item *ngFor="let expense of expenses; trackBy: trackById">
      <ion-label>
        <h2>{{ expense.category }} — {{ expense.amount | currency }}</h2>
        <p *ngIf="expense.description">{{ expense.description }}</p>
        <p>{{ expense.date | date }}</p>
      </ion-label>
      <ion-button slot="end" color="danger" fill="clear" (click)="deleteExpense(expense.id)">
        <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
      </ion-button>
    </ion-item>
  </ion-list>

  <ng-template #loadingSpinner>
    <div class="ion-text-center ion-padding">
      <ion-spinner></ion-spinner>
    </div>
  </ng-template>

  <ion-card *ngIf="showForm">
    <ion-card-header>
      <ion-card-title>Add Expense</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <ion-item>
        <ion-label position="floating">Amount</ion-label>
        <ion-input type="number" [(ngModel)]="formAmount"></ion-input>
      </ion-item>
      <ion-item>
        <ion-label position="floating">Category</ion-label>
        <ion-input [(ngModel)]="formCategory"></ion-input>
      </ion-item>
      <ion-item>
        <ion-label position="floating">Description</ion-label>
        <ion-input [(ngModel)]="formDescription"></ion-input>
      </ion-item>
      <div class="ion-padding-top ion-text-end">
        <ion-button fill="outline" (click)="cancelForm()">Cancel</ion-button>
        <ion-button (click)="saveExpense()">Save</ion-button>
      </div>
    </ion-card-content>
  </ion-card>
</ion-content>
